<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e86c1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e8449;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="smallShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bgGrad)" />

  <!-- Subtle pattern overlay -->
  <g opacity="0.06">
    <line x1="60" y1="496" x2="496" y2="60" stroke="white" stroke-width="2"/>
    <line x1="60" y1="440" x2="440" y2="60" stroke="white" stroke-width="2"/>
    <line x1="60" y1="384" x2="384" y2="60" stroke="white" stroke-width="2"/>
    <line x1="60" y1="328" x2="328" y2="60" stroke="white" stroke-width="2"/>
    <line x1="60" y1="272" x2="272" y2="60" stroke="white" stroke-width="2"/>
    <line x1="60" y1="216" x2="216" y2="60" stroke="white" stroke-width="2"/>
    <line x1="60" y1="160" x2="160" y2="60" stroke="white" stroke-width="2"/>
    <line x1="116" y1="496" x2="496" y2="116" stroke="white" stroke-width="2"/>
    <line x1="172" y1="496" x2="496" y2="172" stroke="white" stroke-width="2"/>
    <line x1="228" y1="496" x2="496" y2="228" stroke="white" stroke-width="2"/>
    <line x1="284" y1="496" x2="496" y2="284" stroke="white" stroke-width="2"/>
    <line x1="340" y1="496" x2="496" y2="340" stroke="white" stroke-width="2"/>
    <line x1="396" y1="496" x2="496" y2="396" stroke="white" stroke-width="2"/>
  </g>

  <!-- Main document (back) -->
  <g filter="url(#shadow)">
    <rect x="110" y="80" width="200" height="260" rx="12" ry="12" fill="url(#docGrad)" />
    <!-- Text lines on main doc -->
    <rect x="135" y="115" width="100" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="135" width="150" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="155" width="130" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="175" width="145" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="195" width="80" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="225" width="150" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="245" width="120" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="265" width="140" height="8" rx="4" fill="#bdc3c7" />
    <rect x="135" y="285" width="90" height="8" rx="4" fill="#bdc3c7" />
    <!-- PDF badge -->
    <rect x="126" y="94" width="40" height="18" rx="4" fill="#e74c3c" />
    <text x="146" y="107" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="11" fill="white" text-anchor="middle">PDF</text>
  </g>

  <!-- Supplementary document (front, offset) -->
  <g filter="url(#shadow)">
    <rect x="200" y="160" width="200" height="260" rx="12" ry="12" fill="url(#docGrad)" />
    <!-- Text lines on suppl doc -->
    <rect x="225" y="200" width="100" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="220" width="150" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="240" width="130" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="260" width="145" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="280" width="80" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="310" width="150" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="330" width="120" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="350" width="140" height="8" rx="4" fill="#d5dbdb" />
    <rect x="225" y="370" width="90" height="8" rx="4" fill="#d5dbdb" />
    <!-- [Suppl] badge -->
    <rect x="216" y="172" width="60" height="20" rx="5" fill="#27ae60" />
    <text x="246" y="186" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="11" fill="white" text-anchor="middle">SUPPL</text>
  </g>

  <!-- Download arrow circle -->
  <g filter="url(#smallShadow)">
    <circle cx="370" cy="120" r="52" fill="url(#arrowGrad)" />
    <!-- Arrow down icon -->
    <path d="M370 85 L370 140" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M348 122 L370 148 L392 122" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Base line -->
    <path d="M345 155 L395 155" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Red plus circle (bottom right) -->
  <g filter="url(#smallShadow)">
    <circle cx="390" cy="390" r="42" fill="url(#plusGrad)" />
    <!-- Plus icon -->
    <path d="M390 368 L390 412" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <path d="M368 390 L412 390" stroke="white" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- "S+" text badge bottom left -->
  <g filter="url(#smallShadow)">
    <rect x="80" y="380" width="80" height="52" rx="14" fill="white" opacity="0.95"/>
    <text x="120" y="415" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="30" fill="#1a5276" text-anchor="middle">S+</text>
  </g>
</svg>
